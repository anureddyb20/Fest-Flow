<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FestFlow</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="fest.css">
</head>

<body>
    <canvas id="particlesCanvas"></canvas>
    <!-- PARTNER DASHBOARD -->
    <div id="partnerDashboard" class="partner-container" style="display: none; position: relative;">
        <canvas id="partnerParticlesCanvas"
            style="position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 0; opacity: 0.8; pointer-events: none;"></canvas>
        <div class="login-blob" style="position: fixed; opacity: 0.15; z-index: 0;"></div>
        <div class="partner-header"
            style="background: rgba(245, 242, 235, 0.1); backdrop-filter: blur(10px); padding: 15px 25px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); position: relative; z-index: 1;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <h2
                    style="color: var(--primary); margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.5px;">
                    Partner Dashboard <span id="partnerZoneIndicator" style="font-size: 14px; color: var(--text-muted); font-weight: 500; margin-left: 10px; opacity: 0.8;"></span></h2>
            </div>

            <div style="display:flex; gap:12px; align-items: center;">
                <button class="theme-btn" onclick="toggleTheme()" title="Toggle Theme"
                    style="height: 38px; width: 38px; padding: 0; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(50, 184, 198, 0.1); color: var(--primary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
                <button onclick="togglePartnerView()" id="viewToggleBtn" title="Toggle View"
                    style="height: 38px; width: 38px; padding: 0; background: var(--bg-darker); border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                        <line x1="12" y1="18" x2="12.01" y2="18"></line>
                    </svg>
                </button>
                <button onclick="logout()" title="Logout"
                    style="height: 38px; width: 38px; padding: 0; background: var(--danger); border: none; border-radius: 8px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(255, 84, 89, 0.3); transition: all 0.2s ease;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </div>
        </div>

        <div class="partner-content"
            style="padding: 25px; max-width: 1400px; margin: 0 auto; width: 100%; position: relative; z-index: 1;">

            <!-- TABS -->
            <div class="partner-tabs">
                <div class="tab-btn active" onclick="switchPartnerTab('panic')" id="tabPanic">Panic Alerts</div>
                <div class="tab-btn" onclick="switchPartnerTab('allotted')" id="tabAllotted">Allotted Tasks</div>
            </div>

            <!-- PANIC ALERTS SECTION -->
            <div id="panicSection" style="display: block;">

                <!-- Panic Alerts Grid -->
                <div class="alerts-grid" id="partnerPanicGrid"
                    style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                </div>
            </div>

            <!-- ALLOTTED TASKS SECTION -->
            <div id="allottedSection" style="display: none;">

                <!-- Tasks Grid -->
                <!-- Note: using grid display by default, container controls visibility -->
                <div id="partnerTasksGrid" class="alerts-grid"
                    style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <!-- Tasks populated via JS -->
                </div>
            </div>

        </div>
    </div>

    <!-- MAIN CONTAINER (ADMIN VIEW) -->
    <div class="container" id="adminDashboard" style="position: relative;">
        <canvas id="adminParticlesCanvas"
            style="position: fixed; top:0; left:0; width: 100%; height: 100%; z-index: 0; opacity: 0.8; pointer-events: none;"></canvas>
        <div class="login-blob" style="position: fixed; opacity: 0.2; z-index: 0;"></div>
        <div class="sidebar">
            <div class="sidebar-header" style="display:flex; justify-content:space-between; align-items:center;">
                <h2>FestFlow</h2>
                <a href="https://festflow-38fde-default-rtdb.asia-southeast1.firebasedatabase.app/" target="_blank"
                    title="Open Live Database"
                    style="font-size:11px; color:var(--text-muted); text-decoration:none; border:1px solid var(--border-color); padding:4px 8px; border-radius:6px; transition:all 0.2s;"
                    onmouseover="this.style.borderColor='var(--primary)'; this.style.color='var(--primary)'"
                    onmouseout="this.style.borderColor='var(--border-color)'; this.style.color='var(--text-muted)'">
                    Live DB ↗
                </a>
            </div>
            <div id="syncStatus" style="font-size: 10px; color: var(--text-muted); margin: -10px 0 15px 10px; padding: 4px 0; display: flex; align-items: center; gap: 6px;">
                <span style="width: 6px; height: 6px; background: var(--success); border-radius: 50%; display: inline-block; box-shadow: 0 0 5px var(--success);"></span>
                Last Sync: <span id="lastSyncTime">Just Now</span>
            </div>
            <div class="zone-controls">
                <button class="add-zone-btn-top" onclick="addZone()" title="Add New Zone">+ Add New Zone</button>
                <button class="icon-btn delete" onclick="deleteZone()" title="Remove Selected Zone">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                </button>
                <button class="icon-btn reset" onclick="resetZones()" title="Reset All Zones">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                        <path d="M3 3v5h5"></path>
                    </svg>
                </button>
            </div>
            <div id="zonesList"></div>


        </div>

        <div class="main-content">
            <!-- TOP 30% - EMERGENCY ALERTS -->
            <div class="top-section">
                <div class="emergency-header">
                    <div class="header-left">
                        <span class="emergency-badge"
                            style="background: var(--danger); animation: pulse 1s infinite;">🚨 PANIC ALERTS</span>
                        <h3 style="color: var(--danger);">PANIC BUTTON CLICKED (>3x)</h3>
                    </div>
                    <div style="display:flex; gap:10px; align-items: center;">
                        <button class="theme-btn" onclick="toggleTheme()" title="Toggle Theme"
                            style="height: 38px; width: 38px; padding: 0; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(50, 184, 198, 0.1); color: var(--primary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="12" cy="12" r="5"></circle>
                                <line x1="12" y1="1" x2="12" y2="3"></line>
                                <line x1="12" y1="21" x2="12" y2="23"></line>
                                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                                <line x1="1" y1="12" x2="3" y2="12"></line>
                                <line x1="21" y1="12" x2="23" y2="12"></line>
                                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                            </svg>
                        </button>
                        <button onclick="logout()" title="Logout"
                            style="height: 38px; width: 38px; padding: 0; background: var(--danger); border: none; border-radius: 8px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(255, 84, 89, 0.3); transition: all 0.2s ease;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                                <polyline points="16 17 21 12 16 7"></polyline>
                                <line x1="21" y1="12" x2="9" y2="12"></line>
                            </svg>
                        </button>
                    </div>
                </div>
                <!-- PANIC ALERTS CONTAINER -->
                <div class="alerts-grid" id="panicGrid"></div>
            </div>

            <!-- BOTTOM 70% - ALL BANDS LIST -->
            <div class="scrollable-section" id="allBandsSection"></div>
        </div>
    </div>

    <!-- MODAL FOR EXPANDED VIEW -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Person Details</div>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- LOGIN OVERLAY -->
    <div id="loginOverlay">
        <div class="login-blob"></div>
        <div class="login-box">
            <div class="login-title">FestFlow</div>
            <div class="login-subtitle">Crowd Monitoring System</div>

            <form onsubmit="handleLogin(event)">
                <input type="text" id="loginUser" class="login-input" placeholder="Username" required>
                <div class="password-wrapper">
                    <input type="password" id="loginPass" class="login-input" placeholder="Password" required>
                    <button type="button" class="password-toggle" onclick="togglePasswordVisibility()"
                        title="Show/Hide Password">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg id="eyeOffIcon" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="20"
                            height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                            </path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </button>
                </div>
                <button type="submit" class="login-btn">Login</button>
                <div id="loginError" class="login-error"></div>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="config.js?v=2"></script>
    <script src="fest.js?v=2"></script>
</body>

</html>
